<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registro de Problemáticas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>


<style>
#map{
    height:400px;
}
.paso{
    display:none;
}
.paso.activo{
    display:block;
}
</style>
</head>

<body>

<div class="container">
<div class="card">
<div class="row">
<div class="col-md-6">
<div class="container mt-4">
<button class="btn btn-primary">
</button>    

<h2 class="text-center">
Registro de Problemáticas
</h2>

<p class="text-center" id="tituloPaso">
Paso 1 de 3
</p>

<!-- PASO 1 -->

<div id="paso1" class="paso activo">

<h4>Datos Personales</h4>

<input class="form-control mb-2"
id="nombre"
placeholder="Nombre">

<input class="form-control mb-2"
id="apaterno"
placeholder="Apellido paterno">

<input class="form-control mb-2"
id="amaterno"
placeholder="Apellido materno">

<input class="form-control mb-2"
id="email"
placeholder="Correo">

<input class="form-control mb-2"
type="password"
id="password"
placeholder="Contraseña">

<button class="btn btn-primary"
onclick="siguientePaso(2)">
Siguiente
</button>

</div>

<div id="paso3" class="paso">

<h4>Ubicación</h4>

<select class="form-select mb-2"
id="estado"></select>

<select class="form-select mb-2"
id="municipio"></select>

<select class="form-select mb-2"
id="localidad"></select>

<input class="form-control mb-2"
id="domicilio"
placeholder="Domicilio">

<div id="map"></div>

<div class="mt-3">

<button class="btn btn-secondary"
onclick="siguientePaso(2)">
Anterior
</button>

<button class="btn btn-success"
onclick="guardarTodo()">
Finalizar
</button>

</div>

</div>

<div id="paso2" class="paso">

<h4>Problemática</h4>

<textarea
class="form-control mb-2"
id="descripcion">
</textarea>

<input class="form-control mb-2"
id="tipoPob"
placeholder="Tipo población">

<input class="form-control mb-2"
id="tipoCamino"
placeholder="Tipo camino">

<select class="form-select mb-2"
id="internet">
<option value="1">Sí</option>
<option value="0">No</option>
</select>

<select class="form-select mb-2"
id="pavimento">
<option value="1">Sí</option>
<option value="0">No</option>
</select>

<button class="btn btn-secondary"
onclick="siguientePaso(1)">
Anterior
</button>
 
<button class="btn btn-primary"
onclick="siguientePaso(3)">
Siguiente
</button>

</div>
</div>
</div>
</div>
</div>
</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="in.js"></script>

</body>
</html>
